<!DOCTYPE html>
<html>
<head>
    <title>DrugLike AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>DrugLike AI</h1>

    <form action="/predict" method="POST">

        <textarea
        name="smiles"
        placeholder="Enter SMILES"></textarea>

        <button type="submit">
            Analyze Molecule
        </button>

    </form>

    {% if result %}

    <div class="result">

        <h2>Analysis Result</h2>

        <p><b>SMILES:</b> {{ smiles }}</p>
        <p><b>Molecular Weight:</b> {{ mol_wt }}</p>
        <p><b>LogP:</b> {{ logp }}</p>
        <p><b>HBA:</b> {{ hba }}</p>
        <p><b>HBD:</b> {{ hbd }}</p>
        <p><b>Lipinski:</b> {{ lipinski }}</p>

    </div>

    {% endif %}

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
